trainer:
  name: Trainer
  num_epochs: 50
  output_dir: checkpoints

model:
  name: efficientnet_b0
  num_classes: 3

dataset:
  name: ImageNetDataLoader
  root: model
  batch_size: 64
  image_size: 224
  num_workers: 2

optimizer:
  name: TFRMSprop
  lr: 0.001
  weight_decay: 0
  rho: 0.9
  eps: 1.e-3
  momentum: 0.9
  warmup: 150

scheduler:
  name: ExponentialLR
  gamma: 0.98738885893
